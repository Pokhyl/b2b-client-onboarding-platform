name: Apply internal HTTP dispatch export migration

on:
  push:
    branches:
      - fix/internal-http-dispatch-contract
    paths:
      - scripts/apply-internal-http-dispatch.mjs
      - .github/workflows/apply-internal-http-dispatch.yml

permissions:
  contents: write

jobs:
  apply-migration:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/internal-http-dispatch-contract
          fetch-depth: 0

      - name: Apply workflow export migration
        run: node scripts/apply-internal-http-dispatch.mjs

      - name: Remove one-shot migration files
        run: |
          rm scripts/apply-internal-http-dispatch.mjs
          rm .github/workflows/apply-internal-http-dispatch.yml

      - name: Validate generated JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('n8n/workflows/WF98-retry-dispatcher.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('n8n/workflows/WF99-central-error-handler.json', 'utf8'))"

      - name: Commit generated exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "feat(n8n): sync internal HTTP dispatch exports [skip ci]"
          git push origin HEAD:fix/internal-http-dispatch-contract
