services:
  n8n-main:
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      OPERATOR_INTERVENTION_RECIPIENT_EMAIL: "${OPERATOR_INTERVENTION_RECIPIENT_EMAIL:?OPERATOR_INTERVENTION_RECIPIENT_EMAIL is required}"
      OPERATOR_INTERVENTION_SENDER_NAME: "${OPERATOR_INTERVENTION_SENDER_NAME:-B2B Onboarding Platform}"
      OPERATOR_INTERVENTION_TEMPLATE_KEY: "${OPERATOR_INTERVENTION_TEMPLATE_KEY:-operator_intervention_v1}"
      WF99_NOTIFICATION_LEASE_SECONDS: "${WF99_NOTIFICATION_LEASE_SECONDS:-300}"
      WF99_NOTIFICATION_MAX_ATTEMPTS: "${WF99_NOTIFICATION_MAX_ATTEMPTS:-5}"

  n8n-worker-1:
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      OPERATOR_INTERVENTION_RECIPIENT_EMAIL: "${OPERATOR_INTERVENTION_RECIPIENT_EMAIL:?OPERATOR_INTERVENTION_RECIPIENT_EMAIL is required}"
      OPERATOR_INTERVENTION_SENDER_NAME: "${OPERATOR_INTERVENTION_SENDER_NAME:-B2B Onboarding Platform}"
      OPERATOR_INTERVENTION_TEMPLATE_KEY: "${OPERATOR_INTERVENTION_TEMPLATE_KEY:-operator_intervention_v1}"
      WF99_NOTIFICATION_LEASE_SECONDS: "${WF99_NOTIFICATION_LEASE_SECONDS:-300}"
      WF99_NOTIFICATION_MAX_ATTEMPTS: "${WF99_NOTIFICATION_MAX_ATTEMPTS:-5}"

  n8n-worker-2:
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      OPERATOR_INTERVENTION_RECIPIENT_EMAIL: "${OPERATOR_INTERVENTION_RECIPIENT_EMAIL:?OPERATOR_INTERVENTION_RECIPIENT_EMAIL is required}"
      OPERATOR_INTERVENTION_SENDER_NAME: "${OPERATOR_INTERVENTION_SENDER_NAME:-B2B Onboarding Platform}"
      OPERATOR_INTERVENTION_TEMPLATE_KEY: "${OPERATOR_INTERVENTION_TEMPLATE_KEY:-operator_intervention_v1}"
      WF99_NOTIFICATION_LEASE_SECONDS: "${WF99_NOTIFICATION_LEASE_SECONDS:-300}"
      WF99_NOTIFICATION_MAX_ATTEMPTS: "${WF99_NOTIFICATION_MAX_ATTEMPTS:-5}"
